<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" id="siteIcon" href="icons/p.webp" type="image/webp" />
    <title>Pila Admin</title>
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <header class="sticky-header">
      <div class="sticky-header-content">
        <div class="sticky-header-left">
          <img id="headerLogo" class="header-logo" src="icons/p.webp" alt="" aria-hidden="true">
          <a class="back-link" href="index.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
            Dashboard
          </a>
          <div class="sticky-header-title-wrapper">
            <p class="sticky-header-title">Admin Panel</p>
            <p class="header-date">All live rooms and active users</p>
          </div>
        </div>
        <div class="sticky-header-actions">
          <button
            class="secondary-btn"
            id="refreshButton"
            title="Reload room list"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M23 4v6h-6" />
              <path d="M1 20v-6h6" />
              <path
                d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
              />
            </svg>
            <span>Refresh</span>
          </button>
          <button class="danger-btn" id="terminateAllButton">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v6M14 11v6" />
              <path d="M9 6V4h6v2" />
            </svg>
            <span>Terminate All</span>
          </button>
        </div>
      </div>
    </header>

    <main class="page">
      <div
        id="adminStats"
        class="admin-stats"
        aria-label="Summary statistics"
      ></div>

      <div id="adminContent" class="admin-content">
        <div class="admin-empty">Loading rooms&hellip;</div>
      </div>
    </main>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal" hidden>
      <div
        class="modal-box"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirmModalTitle"
      >
        <h3 id="confirmModalTitle">Confirm</h3>
        <p id="confirmModalText"></p>
        <div class="modal-actions">
          <button class="secondary-btn" id="cancelConfirmButton">Cancel</button>
          <button class="danger-btn" id="confirmOkButton">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Toast notification -->
    <div
      class="admin-toast"
      id="adminToast"
      role="status"
      aria-live="polite"
      hidden
    >
      <svg
        class="toast-icon"
        id="adminToastIcon"
        viewBox="0 0 24 24"
        aria-hidden="true"
      ></svg>
      <span id="adminToastMsg"></span>
    </div>

    <!-- Loading overlay -->
    <div
      class="loading-overlay"
      id="loadingOverlay"
      hidden
      aria-label="Processing"
    >
      <div class="loading-spinner"></div>
    </div>

    <script type="module" src="js/admin.js"></script>
    <script>
      (function () {
        var icons = ['icons/arrow.webp', 'icons/hash.webp', 'icons/loader.webp', 'icons/node.webp', 'icons/p.webp', 'icons/zero.webp'];
        var picked = icons[Math.floor(Math.random() * icons.length)];
        var img = document.getElementById('headerLogo');
        if (img) img.src = picked;
        var image = new Image();
        image.onload = function () {
          var s = Math.min(image.naturalWidth, image.naturalHeight);
          var sx = (image.naturalWidth - s) / 2;
          var sy = (image.naturalHeight - s) / 2;
          var canvas = document.createElement('canvas');
          canvas.width = canvas.height = 64;
          canvas.getContext('2d').drawImage(image, sx, sy, s, s, 0, 0, 64, 64);
          var link = document.getElementById('siteIcon');
          if (link) { link.href = canvas.toDataURL(); link.type = 'image/png'; }
        };
        image.src = picked;
      })();
    </script>
  </body>
</html>

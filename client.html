<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" id="siteIcon" href="icons/hash.webp" type="image/webp" />
    <title>Pila Client</title>
    <link rel="stylesheet" href="css/client.css" />
  </head>
  <body>
    <div
      class="alert-tint-overlay"
      id="alertRippleOverlay"
      aria-hidden="true"
    ></div>
    <main class="display">
      <section class="disconnect-screen" id="disconnectScreen" hidden>
        <p class="disconnect-kicker">Queue Status</p>
        <h1 class="disconnect-title">ROOM DISCONNECTED</h1>
        <p class="disconnect-reason" id="disconnectReason">
          This queue is no longer connected.
        </p>
        <div class="actions disconnect-actions">
          <a class="button" id="disconnectBackToDashboard" href="index.html"
            >Return to Dashboard</a
          >
        </div>
      </section>
      <section class="live-screen" id="liveScreen">
        <div class="live-banner">
          <p class="room-name" id="roomNameLabel">Queue Room</p>
          <p class="live-clock" id="liveClock" aria-live="off"></p>
        </div>
        <div class="live-content">
          <div class="room" id="roomLabel">Room: main</div>
          <h1>Now Serving</h1>
          <div class="number" id="queueNumber">#0</div>
          <p class="subtext">
            This page updates automatically when the host changes the queue.
          </p>
          <p class="audio-hint" id="audioHint">
            Tap anywhere to enable alert sounds
          </p>
          <p class="status" id="statusText">Connecting...</p>
          <div class="actions">
            <a class="button" id="backToDashboard" href="index.html"
              >Exit Queue</a
            >
          </div>
        </div>
      </section>
    </main>
    <button
      class="client-settings-btn"
      id="clientSettingsButton"
      type="button"
      aria-label="Display settings"
      aria-expanded="false"
      aria-controls="clientSettingsPanel"
    >
      <svg
        viewBox="0 0 24 24"
        aria-hidden="true"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="3" />
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.08a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.08a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.08a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
        />
      </svg>
    </button>
    <div class="client-settings-panel" id="clientSettingsPanel" hidden>
      <p class="client-settings-heading">Display Settings</p>
      <label class="client-toggle-row" for="clientSpeakToggle">
        <span>Speak number</span>
        <input id="clientSpeakToggle" type="checkbox" />
      </label>
      <label class="client-toggle-row" for="clientChimeToggle">
        <span>Chime</span>
        <input id="clientChimeToggle" type="checkbox" />
      </label>
      <label class="client-toggle-row" for="clientRippleToggle">
        <span>Tint</span>
        <input id="clientRippleToggle" type="checkbox" />
      </label>
    </div>
    <script type="module" src="js/client.js"></script>
    <script>
      (function () {
        const el = document.getElementById("liveClock");
        function tick() {
          const now = new Date();
          let h = now.getHours();
          const m = String(now.getMinutes()).padStart(2, "0");
          const ampm = h >= 12 ? "PM" : "AM";
          h = h % 12 || 12;
          const show = now.getSeconds() % 2 === 0;
          el.innerHTML =
            h +
            '<span class="clock-sep" style="opacity:' +
            (show ? "1" : "0.15") +
            '">' +
            ":" +
            "</span>" +
            m +
            ' <span class="clock-ampm">' +
            ampm +
            "</span>";
        }
        tick();
        setInterval(tick, 1000);
      })();
    </script>
    <script>
      (function () {
        var picked = 'icons/hash.webp';
        var image = new Image();
        image.onload = function () {
          var s = Math.min(image.naturalWidth, image.naturalHeight);
          var sx = (image.naturalWidth - s) / 2;
          var sy = (image.naturalHeight - s) / 2;
          var canvas = document.createElement('canvas');
          canvas.width = canvas.height = 64;
          canvas.getContext('2d').drawImage(image, sx, sy, s, s, 0, 0, 64, 64);
          var link = document.getElementById('siteIcon');
          if (link) { link.href = canvas.toDataURL(); link.type = 'image/png'; }
        };
        image.src = picked;
      })();
    </script>
  </body>
</html>
